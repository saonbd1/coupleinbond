<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ridiculously Serious Love Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.ethers.org/lib/ethers-5.2.umd.min.js"></script>
  <style>
    :root {
      --bg1: #ff9a9e;
      --bg2: #fad0c4;
      --bg3: #fbc2eb;
      --text: #2b2b2b;
      --accent: #ff4d6d;
      --accent2: #6a00f4;
      --card: rgba(255, 255, 255, 0.88);
      --muted: #6b6b6b;
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2) 60%, var(--bg3));
    }

    .app {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .tagline {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    label {
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid transparent;
      border-radius: 12px;
      font-size: 1rem;
      background: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 6px rgba(255,77,109,0.15);
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 10px 20px rgba(106,0,244,0.25);
      transition: transform .06s ease-in-out, box-shadow .2s;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .score {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .score-number {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .score-badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      color: #fff;
      background: #ff4d6d;
    }

    .meter {
      display: grid;
      grid-template-columns: 160px 1fr 60px;
      gap: 10px;
      align-items: center;
      margin: 8px 0;
    }
    .meter-label { color: #333; font-weight: 600; }
    .meter-bar {
      height: 12px;
      background: rgba(0,0,0,0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff4d6d, #ffa8c5);
      transition: width .6s ease;
    }
    .meter-value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #333;
    }

    .advice {
      margin-top: 12px;
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(0,0,0,0.06);
    }

    /* Floating heart confetti */
    .heart {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: floatUp linear forwards;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }

    /* Sidebar styles */
    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
      padding: 30px 0;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
      overflow-y: auto;
      z-index: 100;
    }

    .sidebar-title {
      padding: 0 20px;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 30px;
    }

    .sidebar-menu {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sidebar-menu a {
      display: block;
      padding: 14px 20px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      border-left: 4px solid transparent;
    }

    .sidebar-menu a:hover {
      background: rgba(255, 77, 109, 0.1);
      border-left-color: var(--accent);
      padding-left: 24px;
    }

    .sidebar #connectBtn:hover {
      background: var(--accent2);
    }

    .main-content {
      margin-left: 250px;
      width: calc(100% - 250px);
      padding: 24px;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
      }
      .main-content {
        margin-left: 200px;
        width: calc(100% - 200px);
      }
    }

    @media (max-width: 480px) {
      .sidebar {
        width: 150px;
        padding: 20px 0;
      }
      .sidebar-title {
        font-size: 1rem;
        margin-bottom: 20px;
      }
      .sidebar-menu a {
        padding: 12px 15px;
        font-size: 0.85rem;
      }
      .main-content {
        margin-left: 150px;
        width: calc(100% - 150px);
      }
      .app {
        padding: 16px;
      }
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--card);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 32px;
      margin: 10% auto;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideDown 0.3s ease;
      position: relative;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-close {
      position: absolute;
      right: 20px;
      top: 20px;
      font-size: 28px;
      font-weight: bold;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      color: var(--accent);
      transform: scale(1.2);
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 20px;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-title">Menu</div>
      <ul class="sidebar-menu">
        <li><a href="#home">🏠 Home</a></li>
        <li><a href="#about">ℹ️ About Us</a></li>
        <li><a href="#privacy">🔒 Privacy Policy</a></li>
      </ul>
      <div id="walletStatus" style="padding: 14px 20px; color: var(--muted); font-size: 0.9rem;">Wallet: Not connected</div>
      <button id="connectBtn" style="margin: 10px 20px; padding: 10px 16px; border: none; border-radius: 8px; background: var(--accent); color: white; cursor: pointer; font-weight: 600; width: calc(100% - 40px);">Connect Wallet</button>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <div class="app">
        <div class="card">
          <h1>Ridiculously Serious Love Calculator ❤️</h1>
          <p class="tagline">Scientific? No. Entertaining? Absolutely.</p>

          <div class="inputs">
            <div>
              <label for="nameA">Name A</label>
              <input id="nameA" type="text" placeholder="e.g., Alex" />
            </div>
            <div>
              <label for="nameB">Name B</label>
              <input id="nameB" type="text" placeholder="e.g., Sam" />
            </div>
            <button id="calcBtn">Calculate 💘</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="resultModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">&times;</button>
      <h2 class="modal-title">Love Match Results</h2>
      
      <div class="score">
        <div class="score-number" id="modalScoreNumber">0%</div>
        <div class="score-badge" id="modalScoreBadge">Analyzing vibes…</div>
      </div>
      <div id="modalScoreText" style="margin: 16px 0;"></div>

      <div class="meters">
        <div class="meter">
          <div class="meter-label">Vibe alignment</div>
          <div class="meter-bar"><div class="meter-fill" id="modalMVibe"></div></div>
          <div class="meter-value" id="modalMVibeVal">0%</div>
        </div>
        <div class="meter">
          <div class="meter-label">Snack synergy</div>
          <div class="meter-bar"><div class="meter-fill" id="modalMSnack"></div></div>
          <div class="meter-value" id="modalMSnackVal">0%</div>
        </div>
        <div class="meter">
          <div class="meter-label">Texting tempo</div>
          <div class="meter-bar"><div class="meter-fill" id="modalMText"></div></div>
          <div class="meter-value" id="modalMTextVal">0%</div>
        </div>
        <div class="meter">
          <div class="meter-label">Meme compatibility</div>
          <div class="meter-bar"><div class="meter-fill" id="modalMMeme"></div></div>
          <div class="meter-value" id="modalMMemeVal">0%</div>
        </div>
      </div>

      <div class="advice" id="modalAdviceBox" style="margin-top: 16px;"></div>
      <button id="mintBtn" style="margin-top: 16px; padding: 12px 16px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 10px 20px rgba(106,0,244,0.25); transition: transform .06s ease-in-out, box-shadow .2s;">Mint Love NFT</button>
    </div>
  </div>

  <script>
    function normalizeName(s) {
      return (s || "").toLowerCase().replace(/[\s\p{P}\p{S}]/gu, "");
    }

    function pairSeed(a, b) {
      const na = normalizeName(a);
      const nb = normalizeName(b);
      const combo = [na, nb].sort().join("|");
      let h = 2166136261 >>> 0;
      for (let i = 0; i < combo.length; i++) {
        h ^= combo.charCodeAt(i);
        h = Math.imul(h, 16777619) >>> 0;
      }
      return h >>> 0;
    }

    function lcg(seed) {
      let state = seed >>> 0;
      const a = 1664525, c = 1013904223;
      return function() {
        state = (Math.imul(state, a) + c) >>> 0;
        return state / 4294967296;
      };
    }

    function shootHearts(count = 24) {
      const emojis = ["💖", "💘", "❤️", "💞", "💕", "💓"];
      for (let i = 0; i < count; i++) {
        const span = document.createElement("span");
        span.className = "heart";
        span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        const size = (Math.random() * 28) + 18;
        const left = Math.random() * 100;
        const duration = (Math.random() * 2) + 2.5;
        const delay = Math.random() * 0.5;

        span.style.left = left + "vw";
        span.style.bottom = "-40px";
        span.style.fontSize = size + "px";
        span.style.animationDuration = duration + "s";
        span.style.animationDelay = delay + "s";

        document.body.appendChild(span);
        setTimeout(() => span.remove(), (duration + delay) * 1000);
      }
    }

    function badgeFor(score) {
      if (score > 100) return "Cosmic destiny";
      if (score >= 96) return "Endgame energy";
      if (score >= 81) return "Certified swoon";
      if (score >= 61) return "Strong potential";
      if (score >= 41) return "It's complicated";
      if (score >= 21) return "Slow-burn vibes";
      return "Friends with high-fives";
    }

    function commentaryFor(score, a, b, rng) {
      const names = `<span style="font-weight:700;">${a}</span> + <span style="font-weight:700;">${b}</span>`;
      if (normalizeName(a) === normalizeName(b) && normalizeName(a) !== "") {
        return `${names}: Self-love detected! Score: 101% 🎉`;
      }
      if (score <= 20) return `${names}: More "acquaintances" than "soulmates"—for now.`;
      if (score <= 40) return `${names}: There's a shy spark here.`;
      if (score <= 60) return `${names}: Balanced potential!`;
      if (score <= 80) return `${names}: Strong vibes detected!`;
      if (score <= 95) return `${names}: The universe approves! 💕`;
      return `${names}: PERFECT MATCH! 🚀`;
    }

    function adviceFor(score, rng) {
      const actions = ["Send a meme.", "Plan an adventure.", "Be yourselves."];
      const action = actions[Math.floor(rng() * actions.length)];
      let header = score <= 40 ? "Tip:" : "Go for it!";
      return `<strong>${header}</strong> ${action}`;
    }

    function meters(rng) {
      return {
        vibe: Math.floor(rng() * 101),
        snack: Math.floor(rng() * 101),
        text: Math.floor(rng() * 101),
        meme: Math.floor(rng() * 101)
      };
    }

    function calculate(a, b) {
      const seed = pairSeed(a, b);
      const rng = lcg(seed);
      let score = Math.floor(rng() * 101);
      const na = normalizeName(a), nb = normalizeName(b);
      if (na && nb && na === nb) score = 101;
      return { score, meters: meters(rng), rng };
    }

    async function mintNFT(name1, name2, score) {
      if (!window.ethereum) {
        alert("Please install MetaMask to mint NFTs");
        return;
      }
      try {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const network = await provider.getNetwork();
        if (network.chainId !== 763373) {
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0xBA7DD' }],
            });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                  chainId: '0xBA7DD',
                  chainName: 'Ink Sepolia',
                  nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                  rpcUrls: ['https://rpc-gel-sepolia.inkonchain.com'],
                  blockExplorerUrls: ['https://explorer-sepolia.inkonchain.com'],
                }],
              });
            } else {
              throw switchError;
            }
          }
        }
        const signer = provider.getSigner();
        const contract = new ethers.Contract(contractAddress, abi, signer);
        const tx = await contract.mint(name1, name2, score);
        await tx.wait();
        alert(`NFT Minted! Transaction: ${tx.hash}`);
      } catch (error) {
        alert("Minting failed: " + error.message);
      }
    }

    async function connectWallet() {
      if (!window.ethereum) {
        alert("Please install MetaMask to connect your wallet");
        return;
      }
      try {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const network = await provider.getNetwork();
        if (network.chainId !== 763373) {
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0xBA7DD' }],
            });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                  chainId: '0xBA7DD',
                  chainName: 'Ink Sepolia',
                  nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                  rpcUrls: ['https://rpc-gel-sepolia.inkonchain.com'],
                  blockExplorerUrls: ['https://explorer-sepolia.inkonchain.com'],
                }],
              });
            } else {
              throw switchError;
            }
          }
        }
        const signer = provider.getSigner();
        const address = await signer.getAddress();
        el("walletStatus").textContent = `Wallet: ${address.slice(0,6)}...${address.slice(-4)}`;
        el("connectBtn").style.display = "none";
      } catch (error) {
        alert("Connection failed: " + error.message);
      }
    }

    function el(id) {
      return document.getElementById(id);
    }

    let lastNameA = "";
    let lastNameB = "";
    let lastScore = 0;

    const contractAddress = "0xYourContractAddress"; // Replace with deployed contract address on Ink Sepolia
    const abi = [
      "function mint(string name1, string name2, uint8 score) public"
    ];

    function showResults(a, b) {
      lastNameA = a;
      lastNameB = b;
      const out = calculate(a, b);

      lastScore = out.score;

      el("modalScoreNumber").textContent = `${out.score}%`;
      el("modalScoreBadge").textContent = badgeFor(out.score);
      el("modalScoreText").innerHTML = commentaryFor(out.score, a || "???", b || "???", out.rng);

      const setMeter = (idFill, idVal, val) => {
        el(idFill).style.width = `${val}%`;
        el(idVal).textContent = `${val}%`;
      };
      setMeter("modalMVibe", "modalMVibeVal", out.meters.vibe);
      setMeter("modalMSnack", "modalMSnackVal", out.meters.snack);
      setMeter("modalMText", "modalMTextVal", out.meters.text);
      setMeter("modalMMeme", "modalMMemeVal", out.meters.meme);

      el("modalAdviceBox").innerHTML = adviceFor(out.score, out.rng);
      el("resultModal").style.display = "block";

      const hearts = Math.max(8, Math.round(16 + (out.score / 6)));
      shootHearts(hearts);
    }

    function handleCalculate() {
      const nameA = el("nameA");
      const nameB = el("nameB");
      
      if (!nameA || !nameB) return;

      const a = nameA.value.trim();
      const b = nameB.value.trim();

      if (!a || !b) {
        el("modalScoreNumber").textContent = "0%";
        el("modalScoreBadge").textContent = "Input needed";
        el("modalScoreText").innerHTML = "Enter both names!";
        el("resultModal").style.display = "block";
        return;
      }

      showResults(a, b);
    }

    // Initialize when DOM is ready
    document.addEventListener("DOMContentLoaded", function() {
      const btn = el("calcBtn");
      const modal = el("resultModal");
      const closeBtn = el("closeModal");

      if (btn) {
        btn.addEventListener("click", handleCalculate);
      }

      if (closeBtn) {
        closeBtn.addEventListener("click", () => {
          modal.style.display = "none";
        });
      }

      if (modal) {
        window.addEventListener("click", (e) => {
          if (e.target === modal) {
            modal.style.display = "none";
          }
        });
      }

      const mintBtn = el("mintBtn");
      if (mintBtn) {
        mintBtn.addEventListener("click", async () => {
          if (lastNameA && lastNameB) {
            await mintNFT(lastNameA, lastNameB, lastScore);
          } else {
            alert("Please calculate a love score first!");
          }
        });
      }

      const connectBtn = el("connectBtn");
      if (connectBtn) {
        connectBtn.addEventListener("click", connectWallet);
      }

      // Prefill example
      const nameA = el("nameA");
      const nameB = el("nameB");
      if (nameA && nameB) {
        nameA.value = "Taylor";
        nameB.value = "Jordan";
      }
    });
  </script>
</body>
</html>
