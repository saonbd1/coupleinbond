<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Couple in Bond - Love Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --primary: #ff4d6d;
      --primary-dark: #d63d5b;
      --secondary: #6a00f4;
      --secondary-light: #8b3dff;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #ef4444;
      --bg-gradient-1: #ff9a9e;
      --bg-gradient-2: #fad0c4;
      --bg-gradient-3: #fbc2eb;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --text-light: #9ca3af;
      --card-bg: rgba(255, 255, 255, 0.92);
      --card-border: rgba(255, 255, 255, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      color: var(--text-primary);
      background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 50%, var(--bg-gradient-3) 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* Sidebar */
    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(0, 0, 0, 0.05);
      padding: 40px 0;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }

    .sidebar-title {
      padding: 0 24px;
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 40px;
      letter-spacing: -0.5px;
    }

    .sidebar-menu {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sidebar-menu a {
      display: flex;
      align-items: center;
      padding: 14px 24px;
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      border-left: 3px solid transparent;
      gap: 12px;
    }

    .sidebar-menu a:hover {
      background: linear-gradient(90deg, rgba(255, 77, 109, 0.1), transparent);
      border-left-color: var(--primary);
      padding-left: 28px;
    }

    #walletStatus {
      padding: 16px 24px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      margin: 30px 0 20px 0;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    #connectBtn, #disconnectBtn {
      margin: 12px 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      width: calc(100% - 40px);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(106, 0, 244, 0.2);
    }

    #connectBtn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    #connectBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(106, 0, 244, 0.3);
    }

    #disconnectBtn {
      background: linear-gradient(135deg, var(--danger), var(--primary-dark));
      color: white;
      display: none;
    }

    #disconnectBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.3);
    }

    /* Main Content */
    .main-content {
      margin-left: 280px;
      width: calc(100% - 280px);
      padding: 40px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 550px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Card */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      padding: 48px 40px;
      width: 100%;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .tagline {
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 1rem;
      font-weight: 500;
    }

    /* Inputs */
    .inputs {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 28px;
    }

    .inputs > div {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.85rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.8);
      outline: none;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 8px rgba(255, 77, 109, 0.1);
    }

    input[type="text"]::placeholder {
      color: var(--text-light);
    }

    /* Button */
    .inputs button {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 8px 25px rgba(106, 0, 244, 0.3);
      transition: all 0.3s ease;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.95rem;
    }

    .inputs button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(106, 0, 244, 0.4);
    }

    .inputs button:active {
      transform: translateY(-1px);
    }

    /* Heart Animation */
    .heart {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: floatUp 3s linear forwards;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.2));
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) rotate(360deg) scale(0.5);
        opacity: 0;
      }
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal-content {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.2);
      padding: 40px;
      margin: 5% auto;
      max-width: 500px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideDown 0.3s ease;
      position: relative;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-close {
      position: absolute;
      right: 20px;
      top: 20px;
      font-size: 32px;
      font-weight: bold;
      color: var(--text-light);
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      border-radius: 8px;
    }

    .modal-close:hover {
      color: var(--primary);
      background: rgba(255, 77, 109, 0.1);
      transform: scale(1.1);
    }

    .modal-title {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 28px;
      margin-top: 0;
    }

    /* Score Display */
    .score {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(255, 77, 109, 0.08), rgba(106, 0, 244, 0.08));
      border-radius: 16px;
      border: 1px solid rgba(255, 77, 109, 0.2);
    }

    .score-number {
      font-size: 3.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .score-badge {
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(106, 0, 244, 0.3);
    }

    #modalScoreText {
      margin: 20px 0;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* Meters */
    .meters {
      margin: 28px 0;
    }

    .meter {
      display: grid;
      grid-template-columns: 140px 1fr 50px;
      gap: 16px;
      align-items: center;
      margin: 18px 0;
      padding: 14px;
      background: rgba(0, 0, 0, 0.02);
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .meter:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .meter-label {
      color: var(--text-primary);
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .meter-bar {
      height: 10px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 10px rgba(106, 0, 244, 0.4);
    }

    .meter-value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* Advice */
    .advice {
      margin-top: 24px;
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.08), rgba(251, 191, 36, 0.08));
      border-radius: 12px;
      padding: 18px;
      border: 1px solid rgba(74, 222, 128, 0.2);
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .advice strong {
      color: var(--primary);
      font-weight: 700;
    }

    .advice em {
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Mint Button */
    #mintBtn {
      width: 100%;
      margin-top: 24px;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 8px 25px rgba(106, 0, 244, 0.3);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #mintBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(106, 0, 244, 0.4);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 220px;
        padding: 30px 0;
      }

      .main-content {
        margin-left: 220px;
        width: calc(100% - 220px);
        padding: 24px 16px;
      }

      .card {
        padding: 32px 24px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .score-number {
        font-size: 2.5rem;
      }

      .meter {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .meter-value {
        text-align: left;
      }
    }

    @media (max-width: 480px) {
      .sidebar {
        width: 180px;
        padding: 20px 0;
      }

      .sidebar-title {
        font-size: 1.2rem;
        padding: 0 16px;
        margin-bottom: 30px;
      }

      .sidebar-menu a {
        padding: 12px 16px;
        font-size: 0.85rem;
      }

      .main-content {
        margin-left: 180px;
        width: calc(100% - 180px);
        padding: 20px 12px;
      }

      .app {
        max-width: 100%;
      }

      .card {
        padding: 24px 16px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .tagline {
        font-size: 0.9rem;
      }

      .score {
        flex-direction: column;
        gap: 12px;
      }

      .score-number {
        font-size: 2rem;
      }

      .score-badge {
        padding: 8px 14px;
        font-size: 0.8rem;
      }

      .modal-content {
        padding: 24px;
        margin: 20% auto;
      }

      .modal-title {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-title">💕 Couple</div>
      <ul class="sidebar-menu">
        <li><a href="#home">🏠 Home</a></li>
        <li><a href="#about">ℹ️ About Us</a></li>
        <li><a href="#privacy">🔒 Privacy</a></li>
      </ul>
      <div id="walletStatus">Wallet: Not connected</div>
      <button id="connectBtn">Connect Wallet</button>
      <button id="disconnectBtn">Disconnect</button>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <div class="app">
        <div class="card">
          <h1>Love Calculator ❤️</h1>
          <p class="tagline">Find your perfect match compatibility score</p>

          <div class="inputs" role="form" aria-label="Love calculator">
            <div>
              <label for="nameA">Your Name</label>
              <input id="nameA" type="text" placeholder="Enter your name" />
            </div>
            <div>
              <label for="nameB">Their Name</label>
              <input id="nameB" type="text" placeholder="Enter their name" />
            </div>
            <button id="calcBtn">Calculate Match 💘</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="resultModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">&times;</button>
      <h2 class="modal-title">Match Results</h2>
      
      <div class="score">
        <div class="score-number" id="modalScoreNumber">0%</div>
        <div class="score-badge" id="modalScoreBadge">Analyzing…</div>
      </div>
      <div id="modalScoreText"></div>

      <div class="meters">
        <div class="meter">
          <div class="meter-label">Vibe Alignment</div>
          <div class="meter-bar"><div class="meter-fill" id="modalMVibe"></div></div>
          <div class="meter-value" id="modalMVibeVal">0%</div>
        </div>
        <div class="meter">
          <div class="meter-label">Snack Synergy</div>
          <div class="meter-bar"><div class="meter-fill" id="modalMSnack"></div></div>
          <div class="meter-value" id="modalMSnackVal">0%</div>
        </div>
        <div class="meter">
          <div class="meter-label">Texting Tempo</div>
          <div class="meter-bar"><div class="meter-fill" id="modalMText"></div></div>
          <div class="meter-value" id="modalMTextVal">0%</div>
        </div>
        <div class="meter">
          <div class="meter-label">Meme Compatibility</div>
          <div class="meter-bar"><div class="meter-fill" id="modalMMeme"></div></div>
          <div class="meter-value" id="modalMMemeVal">0%</div>
        </div>
      </div>

      <div class="advice" id="modalAdviceBox"></div>
      <button id="mintBtn">Mint Love NFT 🎨</button>
    </div>
  </div>

  <script>
    function normalizeName(s) {
      return (s || "").toLowerCase().replace(/[\s\p{P}\p{S}]/gu, "");
    }

    function pairSeed(a, b) {
      const na = normalizeName(a);
      const nb = normalizeName(b);
      const combo = [na, nb].sort().join("|");
      let h = 2166136261 >>> 0;
      for (let i = 0; i < combo.length; i++) {
        h ^= combo.charCodeAt(i);
        h = Math.imul(h, 16777619) >>> 0;
      }
      return h >>> 0;
    }

    function lcg(seed) {
      let state = seed >>> 0;
      const a = 1664525, c = 1013904223;
      return function() {
        state = (Math.imul(state, a) + c) >>> 0;
        return state / 4294967296;
      };
    }

    function shootHearts(count = 24) {
      const emojis = ["💖", "💘", "❤️", "💞", "💕", "💓"];
      for (let i = 0; i < count; i++) {
        const span = document.createElement("span");
        span.className = "heart";
        span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        const size = (Math.random() * 32) + 20;
        const left = Math.random() * 100;
        const duration = (Math.random() * 2.5) + 2.5;
        const delay = Math.random() * 0.3;

        span.style.left = left + "vw";
        span.style.bottom = "-40px";
        span.style.fontSize = size + "px";
        span.style.animationDuration = duration + "s";
        span.style.animationDelay = delay + "s";

        document.body.appendChild(span);
        setTimeout(() => span.remove(), (duration + delay) * 1000);
      }
    }

    function badgeFor(score) {
      if (score > 100) return "Cosmic Destiny";
      if (score >= 96) return "Endgame Energy";
      if (score >= 81) return "Certified Swoon";
      if (score >= 61) return "Strong Potential";
      if (score >= 41) return "It's Complicated";
      if (score >= 21) return "Slow-Burn Vibes";
      return "Friends First";
    }

    function commentaryFor(score, a, b, rng) {
      const names = `<strong>${a}</strong> + <strong>${b}</strong>`;
      const lines = [];
      if (normalizeName(a) === normalizeName(b) && normalizeName(a) !== "") {
        lines.push(`${names}: Self-love detected! Score upgraded to 101% 🎉`);
      }
      if (score <= 20) {
        lines.push(`${names}: More "acquaintances" than "soulmates"—for now.`);
      } else if (score <= 40) {
        lines.push(`${names}: There's a shy spark here. Start with banter!`);
      } else if (score <= 60) {
        lines.push(`${names}: Balanced potential! Proceed with memes.`);
      } else if (score <= 80) {
        lines.push(`${names}: Strong vibes detected! The universe approves.`);
      } else if (score <= 95) {
        lines.push(`${names}: Certified swoon! Even the stars are aligned.`);
      } else {
        lines.push(`${names}: PERFECT MATCH! Destiny has spoken. 🚀`);
      }

      const quips = [
        "Compatibility verified by an independent panel of pigeons.",
        "The algorithm smelled coffee and said yes.",
        "Scientifically peer-reviewed by three goldfish and one suspicious cat.",
        "If this were a rom-com, you'd meet again in an elevator right now.",
        "Warning: proximity may cause butterflies and excessive emoji usage."
      ];
      lines.push(quips[Math.floor(rng() * quips.length)]);
      return lines.join("<br><br>");
    }

    function adviceFor(score, rng) {
      const actions = [
        "Send a meme that's exactly their sense of humor.",
        "Plan a tiny adventure: street tacos + sunset walk.",
        "Ask a delightfully weird question: 'Preferred cloud shape?'",
        "Compliment something oddly specific (shoes, playlist curation).",
        "Share a favorite snack and declare it your official tradition."
      ];
      const cautions = [
        "Don't speedrun romance—banter first.",
        "Use punctuation responsibly; five exclamation points is a lot!!!",
        "Avoid ghosting. Casper is cute, but communication is cuter.",
        "Respect boundaries like a wholesome ninja.",
        "Remember: hydration helps flirting."
      ];

      const pick = arr => arr[Math.floor(rng() * arr.length)];
      const action = pick(actions);
      const caution = pick(cautions);

      let header;
      if (score <= 40) header = "Starter Pack:";
      else if (score <= 70) header = "Pro Tip:";
      else header = "Go For It (Sensibly):";

      return `<strong>${header}</strong> ${action}<br><em>${caution}</em>`;
    }

    function meters(rng) {
      return {
        vibe: Math.floor(rng() * 101),
        snack: Math.floor(rng() * 101),
        text: Math.floor(rng() * 101),
        meme: Math.floor(rng() * 101)
      };
    }

    function calculate(a, b) {
      const seed = pairSeed(a, b);
      const rng = lcg(seed);
      let score = Math.floor(rng() * 101);
      const na = normalizeName(a), nb = normalizeName(b);
      if (na && nb && na === nb) score = 101;
      return { score, meters: meters(rng), rng };
    }

    async function mintNFT(name1, name2, score) {
      if (!window.ethereum) {
        alert("Please install MetaMask to mint NFTs");
        return;
      }
      try {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const network = await provider.getNetwork();
        if (network.chainId !== 763373) {
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0xdef1' }],
            });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                  chainId: '0xdef1',
                  chainName: 'Ink Chain',
                  nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                  rpcUrls: ['https://rpc-gel.inkonchain.com'],
                  blockExplorerUrls: ['https://explorer.inkonchain.com'],
                }],
              });
            } else {
              throw switchError;
            }
          }
        }
        const signer = provider.getSigner();
        const contract = new ethers.Contract(contractAddress, abi, signer);
        const tx = await contract.mint(name1, name2, score);
        await tx.wait();
        alert(`NFT Minted! Transaction: ${tx.hash}`);
      } catch (error) {
        alert("Minting failed: " + error.message);
      }
    }

    async function connectWallet() {
      if (typeof ethers === 'undefined') {
        console.error('Ethers not loaded');
        alert('Ethers library failed to load. Please refresh the page.');
        return;
      }
      if (!window.ethereum) {
        alert("Please install MetaMask to connect your wallet");
        return;
      }
      try {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const network = await provider.getNetwork();
        if (network.chainId !== 763373) {
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0xdef1' }],
            });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                  chainId: '0xdef1',
                  chainName: 'Ink Chain',
                  nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                  rpcUrls: ['https://rpc-gel.inkonchain.com'],
                  blockExplorerUrls: ['https://explorer.inkonchain.com'],
                }],
              });
            } else {
              throw switchError;
            }
          }
        }
        const signer = provider.getSigner();
        const address = await signer.getAddress();
        el("walletStatus").textContent = `Wallet: ${address.slice(0,6)}...${address.slice(-4)}`;
        el("connectBtn").style.display = "none";
        el("disconnectBtn").style.display = "block";
      } catch (error) {
        alert("Connection failed: " + error.message);
      }
    }

    function disconnectWallet() {
      el("walletStatus").textContent = "Wallet: Not connected";
      el("connectBtn").style.display = "block";
      el("disconnectBtn").style.display = "none";
    }

    function el(id) {
      return document.getElementById(id);
    }

    let lastNameA = "";
    let lastNameB = "";
    let lastScore = 0;

    const contractAddress = "0x66dF01e59AC8AC13575bB760500be7DBADf78D32";
    const abi = ["function mint(string name1, string name2, uint8 score) public"];

    function showResults(a, b) {
      lastNameA = a;
      lastNameB = b;
      const out = calculate(a, b);
      lastScore = out.score;

      el("modalScoreNumber").textContent = `${out.score}%`;
      el("modalScoreBadge").textContent = badgeFor(out.score);
      el("modalScoreText").innerHTML = commentaryFor(out.score, a || "???", b || "???", out.rng);

      const setMeter = (idFill, idVal, val) => {
        el(idFill).style.width = `${val}%`;
        el(idVal).textContent = `${val}%`;
      };
      setMeter("modalMVibe", "modalMVibeVal", out.meters.vibe);
      setMeter("modalMSnack", "modalMSnackVal", out.meters.snack);
      setMeter("modalMText", "modalMTextVal", out.meters.text);
      setMeter("modalMMeme", "modalMMemeVal", out.meters.meme);

      el("modalAdviceBox").innerHTML = adviceFor(out.score, out.rng);
      el("resultModal").style.display = "block";

      const hearts = Math.max(12, Math.round(20 + (out.score / 5)));
      shootHearts(hearts);
    }

    function handleCalculate() {
      const nameA = el("nameA");
      const nameB = el("nameB");
      
      if (!nameA || !nameB) return;

      const a = nameA.value.trim();
      const b = nameB.value.trim();

      if (!a || !b) {
        el("modalScoreNumber").textContent = "0%";
        el("modalScoreBadge").textContent = "Input needed";
        el("modalScoreText").innerHTML = "Please enter both names to calculate your match!";
        el("resultModal").style.display = "block";
        return;
      }

      showResults(a, b);
    }

    document.addEventListener("DOMContentLoaded", function() {
      const btn = el("calcBtn");
      const modal = el("resultModal");
      const closeBtn = el("closeModal");

      if (btn) {
        btn.addEventListener("click", handleCalculate);
      }

      if (closeBtn) {
        closeBtn.addEventListener("click", () => {
          modal.style.display = "none";
        });
      }

      if (modal) {
        window.addEventListener("click", (e) => {
          if (e.target === modal) {
            modal.style.display = "none";
          }
        });
      }

      const mintBtn = el("mintBtn");
      if (mintBtn) {
        mintBtn.addEventListener("click", async () => {
          if (lastNameA && lastNameB) {
            await mintNFT(lastNameA, lastNameB, lastScore);
          } else {
            alert("Please calculate a love score first!");
          }
        });
      }

      const connectBtn = el("connectBtn");
      if (connectBtn) {
        connectBtn.addEventListener("click", connectWallet);
      }

      const disconnectBtn = el("disconnectBtn");
      if (disconnectBtn) {
        disconnectBtn.addEventListener("click", disconnectWallet);
      }

      const nameA = el("nameA");
      const nameB = el("nameB");
      if (nameA && nameB) {
        nameA.value = "Taylor";
        nameB.value = "Jordan";
      }

      const calcBtn = el("calcBtn");
      [nameA, nameB].forEach(inp => {
        inp.addEventListener("keydown", e => {
          if (e.key === "Enter") handleCalculate();
        });
      });
    });
  </script>
</body>
</html>
